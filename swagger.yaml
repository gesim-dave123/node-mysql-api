openapi: 3.0.0
info:
  title: Node MySQL API
  version: 1.0.0
servers:
  - url: https://node-mysql-api-ylo3.onrender.com

paths:
  /accounts/authenticate:
    post:
      tags:
        - Authentication
      summary: Authenticate user with email and password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
      responses:
        "200":
          description: Login successful

  /accounts/refresh-token:
    post:
      tags:
        - Authentication
      summary: Refresh JWT token
      security:
        - bearerAuth: []
      responses:
        "200":
          description: New token generated

  /accounts/revoke-token:
    post:
      tags:
        - Authentication
      summary: Revoke refresh token
      security:
        - bearerAuth: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                token:
                  type: string
      responses:
        "200":
          description: Token revoked

  /accounts/register:
    post:
      tags:
        - Account Management
      summary: Register new account
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                [
                  title,
                  firstName,
                  lastName,
                  email,
                  password,
                  confirmPassword,
                  acceptTerms,
                ]
              properties:
                title:
                  type: string
                firstName:
                  type: string
                lastName:
                  type: string
                email:
                  type: string
                  format: email
                password:
                  type: string
                confirmPassword:
                  type: string
                acceptTerms:
                  type: boolean
      responses:
        "200":
          description: Registration successful

  /accounts/verify-email:
    post:
      tags:
        - Account Management
      summary: Verify email with token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [token]
              properties:
                token:
                  type: string
      responses:
        "200":
          description: Email verified

  /accounts/forgot-password:
    post:
      tags:
        - Account Management
      summary: Request password reset
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email:
                  type: string
                  format: email
      responses:
        "200":
          description: Reset email sent

  /accounts/validate-reset-token:
    post:
      tags:
        - Account Management
      summary: Validate password reset token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [token]
              properties:
                token:
                  type: string
      responses:
        "200":
          description: Token valid

  /accounts/reset-password:
    post:
      tags:
        - Account Management
      summary: Reset password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [token, password]
              properties:
                token:
                  type: string
                password:
                  type: string
      responses:
        "200":
          description: Password reset

  /accounts:
    get:
      tags:
        - Account Management
      summary: Get all accounts (Admin)
      security:
        - bearerAuth: []
      responses:
        "200":
          description: List of accounts

    post:
      tags:
        - Account Management
      summary: Create new account (Admin)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [title, firstName, lastName, email, password]
              properties:
                title:
                  type: string
                firstName:
                  type: string
                lastName:
                  type: string
                email:
                  type: string
                password:
                  type: string
      responses:
        "201":
          description: Account created

  /accounts/{id}:
    get:
      tags:
        - Account Management
      summary: Get account by ID
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Account details

    put:
      tags:
        - Account Management
      summary: Update account
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                title:
                  type: string
                firstName:
                  type: string
                lastName:
                  type: string
                email:
                  type: string
                password:
                  type: string
      responses:
        "200":
          description: Account updated

    delete:
      tags:
        - Account Management
      summary: Delete account
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Account deleted

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
